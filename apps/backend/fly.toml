# fly.toml — LLM Test Lab backend
# Deploy: fly deploy --config apps/backend/fly.toml

app = "llm-test-lab-backend"
primary_region = "lhr"   # London — closest to Dublin

[build]
  dockerfile = "apps/backend/Dockerfile"

[env]
  PORT           = "8080"
  PYTHONUNBUFFERED = "1"
  # All secrets set via: fly secrets set KEY=value --app llm-test-lab-backend
  # Required secrets:
  #   GROQ_API_KEY
  #   SECRET_KEY          (JWT signing key — any 32+ char random string)
  #   SUPABASE_DB_URL     (postgres://... from Supabase project settings)
  #   CORS_ALLOWED_ORIGINS  (https://llm-test-lab-app.vercel.app,https://llm-test-lab-psi.vercel.app)
  # Optional:
  #   RESEND_API_KEY
  #   FROM_EMAIL
  #   APP_URL

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true   # stops after 5 min idle (saves free allowance)
  auto_start_machines = true   # wakes on first request (~1-2s cold start vs Render's 30s)
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"   # free tier: 3 shared-cpu-1x machines included
  memory = "512mb"

[[services.http_checks]]
  grace_period   = "10s"
  interval       = "30s"
  method         = "GET"
  path           = "/health"
  timeout        = "5s"
