name: LLM Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Unit tests — runs first, blocks eval if scoring logic is broken
  # -------------------------------------------------------------------------
  unit-tests:
    name: 🧪 Unit Tests (scoring logic)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: pip install pytest pytest-asyncio

      - name: Run unit tests
        run: pytest apps/backend/tests/ -v

  # -------------------------------------------------------------------------
  # Job 2: LLM evaluation — only runs if unit tests pass
  # -------------------------------------------------------------------------
  evaluate:
    name: 🤖 LLM Test Lab CI
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CLI deps
        run: pip install pyyaml requests

      - name: Validate API URL is set
        run: |
          if [ -z "${{ vars.LLM_TEST_LAB_API_URL }}" ]; then
            echo "❌ LLM_TEST_LAB_API_URL is not set in GitHub repository variables."
            echo "   Go to: Settings → Secrets and variables → Actions → Variables"
            echo "   Add: LLM_TEST_LAB_API_URL = https://llm-test-lab.onrender.com"
            exit 1
          fi
          echo "✅ API URL: ${{ vars.LLM_TEST_LAB_API_URL }}"

      - name: Validate token is set
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          if [ -z "$LLM_TEST_LAB_TOKEN" ]; then
            echo "❌ LLM_TEST_LAB_TOKEN secret is not set."
            echo "   Go to: Settings → Secrets and variables → Actions → Secrets"
            echo "   Add: LLM_TEST_LAB_TOKEN = <your API token from the LLM Test Lab dashboard>"
            exit 1
          fi
          echo "✅ Token is set (length=${#LLM_TEST_LAB_TOKEN})"

      - name: Run LLM Test Lab evaluation
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          python cli/llm_eval.py \
            --api-url ${{ vars.LLM_TEST_LAB_API_URL }} \
            --token "$LLM_TEST_LAB_TOKEN" \
            --scenarios apps/backend/scenarios.yaml \
            --project "llm-test-lab" \
            --variant "${{ github.sha }}" \
            --run-label "CI: ${{ github.ref_name }} @ ${{ github.sha }}" \
            --model "llama-3.1-8b-instant" \
            --app-url "https://llm-test-lab-test.onrender.com/answer" \
            --fail-under 0.6

      - name: Upload results summary
        if: always()
        run: echo "View full results at ${{ vars.LLM_TEST_LAB_API_URL }}"
