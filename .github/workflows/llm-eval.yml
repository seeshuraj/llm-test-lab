name: 🧪 LLM Test Lab CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit tests — pure Python, no network, no Groq calls
  # ---------------------------------------------------------------------------
  unit-tests:
    name: 🧪 Unit Tests (scoring logic)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          pip install pytest pytest-asyncio numpy pyyaml
          pip install -e packages/core-python
          pip install -e packages/sdk-python

      - name: Run unit tests
        # PYTHONPATH=. ensures "from apps.backend.app.rag_metrics import ..."
        # resolves from the repo root without installing the full backend.
        env:
          PYTHONPATH: "."
        run: pytest apps/backend/tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: LLM evaluation — only runs if unit tests pass
  # ---------------------------------------------------------------------------
  evaluate:
    name: 🤖 LLM Test Lab CI
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CLI deps
        run: pip install pyyaml

      # -----------------------------------------------------------------------
      # Validate required config before spending time on warm-ups
      # -----------------------------------------------------------------------
      - name: Validate required config
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          ERRORS=0
          if [ -z "${{ vars.LLM_TEST_LAB_API_URL }}" ]; then
            echo "❌ LLM_TEST_LAB_API_URL is not set."
            echo "   Settings → Secrets and variables → Actions → Variables"
            echo "   Value: https://llm-test-lab.onrender.com  (your Render backend URL)"
            ERRORS=1
          else
            echo "✅ API URL: ${{ vars.LLM_TEST_LAB_API_URL }}"
          fi
          if [ -z "$LLM_TEST_LAB_TOKEN" ]; then
            echo "❌ LLM_TEST_LAB_TOKEN secret is not set."
            echo "   Settings → Secrets and variables → Actions → Secrets"
            echo "   Value: your ltk_... API key from the LLM Test Lab dashboard"
            ERRORS=1
          else
            echo "✅ Token is set (length=${#LLM_TEST_LAB_TOKEN})"
          fi
          exit $ERRORS

      # -----------------------------------------------------------------------
      # Step 1: Wake the TEST APP first — this is what the backend calls
      # during evaluation. If it's cold when the eval fires, backend returns 502.
      # Must be READY before we even touch the backend.
      # HTTP 500 during warm-up = Render worker still booting — keep retrying.
      # -----------------------------------------------------------------------
      - name: ⏳ Warm up test app (llm-test-lab-test.onrender.com)
        run: |
          echo "Waking test app from Render free-tier sleep..."
          READY=0
          for i in $(seq 1 14); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 35 \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{"question":"ping"}' \
              "https://llm-test-lab-test.onrender.com/answer" 2>/dev/null || echo "000")
            echo "  Attempt $i/14: HTTP $STATUS"
            # 200 = fully ready; 422 = app alive but wrong payload shape — both mean awake
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "422" ]; then
              echo "✅ Test app is ready (HTTP $STATUS)"
              READY=1
              break
            fi
            if [ "$STATUS" = "500" ]; then
              echo "  ⚠️  HTTP 500 — Render worker still booting, retrying..."
            elif [ "$STATUS" = "000" ]; then
              echo "  💤 No connection yet..."
            fi
            if [ "$i" != "14" ]; then
              echo "  Sleeping 15s before retry..."
              sleep 15
            fi
          done
          if [ "$READY" = "0" ]; then
            echo "❌ Test app never became ready after ~3.5 minutes."
            echo "   Check: https://dashboard.render.com → llm-test-lab-test service"
            echo "   The service may be suspended or have a startup error."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Step 2: Wake the BACKEND API — after test app is confirmed ready
      # -----------------------------------------------------------------------
      - name: ⏳ Warm up backend API (${{ vars.LLM_TEST_LAB_API_URL }})
        run: |
          echo "Waking backend API..."
          READY=0
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 35 \
              "${{ vars.LLM_TEST_LAB_API_URL }}/health" 2>/dev/null || echo "000")
            echo "  Attempt $i/10: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is ready"
              READY=1
              break
            fi
            if [ "$i" != "10" ]; then
              echo "  Sleeping 15s before retry..."
              sleep 15
            fi
          done
          if [ "$READY" = "0" ]; then
            echo "❌ Backend never responded after ~2.5 minutes."
            echo "   Check: https://dashboard.render.com → llm-test-lab service"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Step 3: Settle pause — both services awake; allow DB migrations to finish
      # -----------------------------------------------------------------------
      - name: ⏳ Settle pause (5s)
        run: sleep 5

      # -----------------------------------------------------------------------
      # Step 4: Run the evaluation
      # -----------------------------------------------------------------------
      - name: 🚀 Run LLM Test Lab evaluation
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          python cli/llm_eval.py \
            --api-url "${{ vars.LLM_TEST_LAB_API_URL }}" \
            --token "$LLM_TEST_LAB_TOKEN" \
            --scenarios apps/backend/scenarios.yaml \
            --project "llm-test-lab" \
            --variant "${{ github.sha }}" \
            --run-label "CI: ${{ github.ref_name }} @ $(echo '${{ github.sha }}' | cut -c1-7)" \
            --model "llama-3.1-8b-instant" \
            --app-url "https://llm-test-lab-test.onrender.com/answer" \
            --fail-under 0.6

      - name: 📊 Results summary
        if: always()
        run: |
          echo "View full results: ${{ vars.LLM_TEST_LAB_API_URL }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
