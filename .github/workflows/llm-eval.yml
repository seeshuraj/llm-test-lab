name: LLM Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  evaluate:
    name: Run LLM Evaluations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run LLM Test Lab evaluation
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          python cli/llm_eval.py \
            --api-url ${{ vars.LLM_TEST_LAB_API_URL }} \
            --token "$LLM_TEST_LAB_TOKEN" \
            --scenarios apps/backend/scenarios.yaml \
            --project "llm-test-lab" \
            --variant "${{ github.sha }}" \
            --run-label "CI: ${{ github.ref_name }} @ ${{ github.sha }}" \
            --model "llama-3.1-8b-instant" \
            --app-url "https://llm-test-lab-test.onrender.com/answer" \
            --fail-under 0.6

      - name: Upload results summary
        if: always()
        run: echo "View full results at ${{ vars.LLM_TEST_LAB_API_URL }}"
