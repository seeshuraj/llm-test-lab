name: LLM Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Unit tests — self-contained, no backend deps needed
  # -------------------------------------------------------------------------
  unit-tests:
    name: 🧪 Unit Tests (scoring logic)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: pip install pytest

      - name: Run unit tests
        run: pytest apps/backend/tests/ -v

  # -------------------------------------------------------------------------
  # Job 2: LLM evaluation — only runs if unit tests pass
  # -------------------------------------------------------------------------
  evaluate:
    name: 🤖 LLM Test Lab CI
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CLI deps
        run: pip install pyyaml

      - name: Validate API URL is set
        run: |
          if [ -z "${{ vars.LLM_TEST_LAB_API_URL }}" ]; then
            echo "❌ LLM_TEST_LAB_API_URL is not set in GitHub repository variables."
            echo "   Go to: Settings → Secrets and variables → Actions → Variables"
            echo "   Add: LLM_TEST_LAB_API_URL = https://llm-test-lab.onrender.com"
            exit 1
          fi
          echo "✅ API URL: ${{ vars.LLM_TEST_LAB_API_URL }}"

      - name: Validate token is set
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          if [ -z "$LLM_TEST_LAB_TOKEN" ]; then
            echo "❌ LLM_TEST_LAB_TOKEN secret is not set."
            echo "   Go to: Settings → Secrets and variables → Actions → Secrets"
            echo "   Add: LLM_TEST_LAB_TOKEN = <your API token from the LLM Test Lab dashboard>"
            exit 1
          fi
          echo "✅ Token is set (length=${#LLM_TEST_LAB_TOKEN})"

      - name: Warm up backend API (Render free tier cold start)
        run: |
          echo "Pinging backend to wake it from sleep..."
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              "${{ vars.LLM_TEST_LAB_API_URL }}/health" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is awake"
              break
            fi
            if [ "$i" = "8" ]; then
              echo "⚠️  Backend did not respond after 8 attempts — proceeding anyway."
            else
              echo "  Sleeping 15s before retry..."
              sleep 15
            fi
          done

      - name: Warm up test app (Render free tier cold start)
        run: |
          echo "Pinging test app to wake it from sleep..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              "https://llm-test-lab-test.onrender.com/answer" \
              -X POST -H "Content-Type: application/json" \
              -d '{"question":"ping"}' 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "422" ] || [ "$STATUS" = "404" ]; then
              echo "✅ Test app is awake (HTTP $STATUS)"
              break
            fi
            if [ "$i" = "6" ]; then
              echo "⚠️  Test app did not respond after 6 attempts — evaluation may still proceed."
            else
              echo "  Sleeping 15s before retry..."
              sleep 15
            fi
          done

      - name: Run LLM Test Lab evaluation
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          python cli/llm_eval.py \
            --api-url ${{ vars.LLM_TEST_LAB_API_URL }} \
            --token "$LLM_TEST_LAB_TOKEN" \
            --scenarios apps/backend/scenarios.yaml \
            --project "llm-test-lab" \
            --variant "${{ github.sha }}" \
            --run-label "CI: ${{ github.ref_name }} @ ${{ github.sha }}" \
            --model "llama-3.1-8b-instant" \
            --app-url "https://llm-test-lab-test.onrender.com/answer" \
            --fail-under 0.6

      - name: Upload results summary
        if: always()
        run: echo "View full results at ${{ vars.LLM_TEST_LAB_API_URL }}"
