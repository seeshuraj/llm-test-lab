name: 🧪 LLM Test Lab CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit tests — pure Python, no network, no Groq calls
  # ---------------------------------------------------------------------------
  unit-tests:
    name: 🧪 Unit Tests (scoring logic)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          pip install pytest pytest-asyncio numpy pyyaml
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "sentence-transformers>=2.2.0"
          pip install -e packages/core-python
          pip install -e packages/sdk-python

      - name: Run unit tests
        env:
          PYTHONPATH: "."
        run: pytest apps/backend/tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: LLM evaluation — only runs if unit tests pass
  # NOTE: continue-on-error until Render free-tier quota resets (May 2026)
  # Remove continue-on-error once test app is reliably available
  # ---------------------------------------------------------------------------
  evaluate:
    name: 🤖 LLM Test Lab CI
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CLI deps
        run: pip install pyyaml

      # -----------------------------------------------------------------------
      # Validate required config before spending time on warm-ups
      # -----------------------------------------------------------------------
      - name: Validate required config
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          ERRORS=0
          if [ -z "${{ vars.LLM_TEST_LAB_API_URL }}" ]; then
            echo "❌ LLM_TEST_LAB_API_URL is not set."
            echo "   Settings → Secrets and variables → Actions → Variables"
            echo "   Value: https://llm-test-lab-backend.fly.dev  (your Fly.io backend URL)"
            ERRORS=1
          else
            echo "✅ API URL: ${{ vars.LLM_TEST_LAB_API_URL }}"
          fi
          if [ -z "$LLM_TEST_LAB_TOKEN" ]; then
            echo "❌ LLM_TEST_LAB_TOKEN secret is not set."
            ERRORS=1
          else
            echo "✅ Token is set (length=${#LLM_TEST_LAB_TOKEN})"
          fi
          exit $ERRORS

      # -----------------------------------------------------------------------
      # Step 1: Wake the TEST APP
      # -----------------------------------------------------------------------
      - name: ⏳ Warm up test app (llm-test-lab-test.onrender.com)
        run: |
          echo "Waking test app..."
          READY=0
          CONSECUTIVE_500=0

          for i in $(seq 1 14); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 35 \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{"question":"ping"}' \
              "https://llm-test-lab-test.onrender.com/answer" 2>/dev/null || echo "000")
            echo "  Attempt $i/14: HTTP $STATUS"

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "422" ]; then
              echo "✅ Test app is ready (HTTP $STATUS)"
              READY=1
              CONSECUTIVE_500=0
              break
            fi

            if [ "$STATUS" = "500" ]; then
              CONSECUTIVE_500=$((CONSECUTIVE_500 + 1))
              if [ "$CONSECUTIVE_500" -ge 3 ]; then
                echo "❌ FATAL: Test app returned HTTP 500 three times in a row."
                echo "   Check GROQ_API_KEY env var in Render → llm-test-lab-test service."
                exit 1
              fi
            else
              CONSECUTIVE_500=0
            fi

            [ "$i" != "14" ] && sleep 15
          done

          [ "$READY" = "0" ] && echo "❌ Test app never became ready." && exit 1

      # -----------------------------------------------------------------------
      # Step 2: Wake the BACKEND API (Fly.io — fast auto-start)
      # -----------------------------------------------------------------------
      - name: ⏳ Warm up backend API (${{ vars.LLM_TEST_LAB_API_URL }})
        run: |
          echo "Waking Fly.io backend..."
          READY=0
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              "${{ vars.LLM_TEST_LAB_API_URL }}/health" 2>/dev/null || echo "000")
            echo "  Attempt $i/6: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is ready"
              READY=1
              break
            fi
            [ "$i" != "6" ] && sleep 5
          done
          [ "$READY" = "0" ] && echo "❌ Backend never responded. Check: fly logs --app llm-test-lab-backend" && exit 1

      # -----------------------------------------------------------------------
      # Step 3: Settle pause
      # -----------------------------------------------------------------------
      - name: ⏳ Settle pause (5s)
        run: sleep 5

      # -----------------------------------------------------------------------
      # Step 4: Run the evaluation
      # -----------------------------------------------------------------------
      - name: 🚀 Run LLM Test Lab evaluation
        env:
          LLM_TEST_LAB_TOKEN: ${{ secrets.LLM_TEST_LAB_TOKEN }}
        run: |
          python cli/llm_eval.py \
            --api-url "${{ vars.LLM_TEST_LAB_API_URL }}" \
            --token "$LLM_TEST_LAB_TOKEN" \
            --scenarios apps/backend/scenarios.yaml \
            --project "llm-test-lab" \
            --variant "${{ github.sha }}" \
            --run-label "CI: ${{ github.ref_name }} @ $(echo '${{ github.sha }}' | cut -c1-7)" \
            --model "llama-3.1-8b-instant" \
            --app-url "https://llm-test-lab-test.onrender.com/answer" \
            --fail-under 0.6

      - name: 📊 Results summary
        if: always()
        run: |
          echo "View full results: ${{ vars.LLM_TEST_LAB_API_URL }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
