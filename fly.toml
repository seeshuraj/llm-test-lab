# fly.toml — LLM Test Lab backend
# MUST live at repo root so Docker build context = full repo
# (packages/core-python and packages/sdk-python are outside apps/backend/)
#
# Deploy:  fly deploy --config fly.toml --remote-only
# UI:      Working directory = (empty)   Config path = fly.toml

app            = "llm-test-lab"
primary_region = "lhr"

[build]
  dockerfile = "apps/backend/Dockerfile"

[env]
  PORT             = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
